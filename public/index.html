<!DOCTYPE html>
<html>
<head>
    <title>RouteWiz</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC7cDFhegBSrGFFuHphsGCLLe_nXrVsf68&libraries=places"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>

<body>

<div class="topbar glass">
    <div class="logo-text">RouteWiz</div>
    <div class="nav-links">
        <a class="active" href="index.html">Place Order</a>
        <a href="records.html">Records</a>
        <a href="settings.html">Settings</a>
        <button class="logout" onclick="logout()">Logout</button>
        <button class="dark-toggle" onclick="toggleDark()">🌙</button>
    </div>
</div>

<div class="layout">

    <div class="sidebar glass">

        <h2>Route Planner</h2>

        <div class="glass" style="padding: 16px; margin-bottom: 24px; border: 1px solid rgba(0, 194, 168, 0.4); background: rgba(0, 194, 168, 0.05); box-shadow: 0 0 15px rgba(0, 194, 168, 0.1); border-radius: 12px;">
            <div style="font-size: 14px; font-weight: 600; color: #00c2a8; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;">
                <span>✨</span> AI Route Assistant
            </div>
            
            <textarea id="smartPrompt" placeholder="Paste customer message here... (e.g., 'I need to deliver this to this bla bla bla')" style="width: 100%; height: 75px; background: rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: inherit; padding: 10px; font-family: inherit; font-size: 13px; resize: none; margin-bottom: 12px; box-sizing: border-box;"></textarea>
            
            <button onclick="generateSmartRoute()" id="aiBtn" style="background: linear-gradient(135deg, #00c2a8, #066460); width: 100%; padding: 12px; font-size: 14px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0, 194, 168, 0.3);">
                🪄 Auto-Fill Route
            </button>
        </div>
        
        <div id="stops"></div>
        <button class="add-stop" onclick="addStop()">+ Add Stop</button>

        <h3>Vehicle Type</h3>
        <div class="vehicle-grid">
            <div class="vehicle-card glow" onclick="selectVehicle('motorcycle')" id="v-motorcycle">
                🏍️ Motorcycle
            </div>
            <div class="vehicle-card glow" onclick="selectVehicle('sedan')" id="v-sedan">
                🚗 Sedan
            </div>
            <div class="vehicle-card glow" onclick="selectVehicle('suv')" id="v-suv">
                🚙 SUV
            </div>
            <div class="vehicle-card glow" onclick="selectVehicle('van')" id="v-van">
                🚐 Van
            </div>
        </div>

        <button onclick="calculateRoute()" style="margin-bottom: 24px;">Find Best Route</button>

        <div id="routeOptions" style="display: none; flex-direction: column; gap: 8px; margin-top: 16px; margin-bottom: 12px; max-height: 180px; overflow-y: auto; padding-right: 4px;"></div>

        <div class="fare-card glow" id="fareCard">Fare: ₱0</div>
        <button id="startDeliveryBtn" style="display: none;" onclick="startDelivery()">🚀 Start Delivery</button>

        
        <div id="deliveryPanel" style="display: none; margin-top: 16px;">
            <hr style="border-color: rgba(255,255,255,0.2); margin: 16px 0;">
            <h3 style="margin-top: 0;">Drop-off Proof</h3>
            
        
            <div id="cameraContainer" style="position: relative; width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #00c2a8; margin-bottom: 12px; background: #000;">
                <video id="cameraStream" autoplay playsinline style="width: 100%; display: block;"></video>
                
                
                <button id="snapBtn" onclick="takeSnapshot()" style="position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; border-radius: 50%; background: white; border: 4px solid #00c2a8; cursor: pointer; padding: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.5);"></button>
            </div>

           
            <canvas id="canvas" style="display: none;"></canvas>

          
            <img id="photoPreview" style="display: none; width: 100%; border-radius: 12px; margin-bottom: 12px; border: 2px solid #00c2a8;">

            <button id="retakeBtn" style="display: none; background: #ff4757; margin-bottom: 12px;" onclick="retakePhoto()">🔄 Retake</button>
            <button id="completeBtn" style="background: #999; cursor: not-allowed;" disabled onclick="completeDelivery()">✔️ Complete Delivery</button>
        </div>

    </div>

    <div id="map"></div>

</div>

<script src="app.js"></script>

</body>
</html>
